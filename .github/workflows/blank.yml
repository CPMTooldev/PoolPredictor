name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: List files (debug)
      run: ls -la
    
    - name: Extract ZIP file
      run: |
        # Find and extract any zip file
        for zipfile in *.zip; do
          if [ -f "$zipfile" ]; then
            echo "Extracting $zipfile"
            unzip -o "$zipfile" -d .
            rm "$zipfile"
          fi
        done
        # If no zip found, maybe files are already extracted
        echo "Files after extraction:"
        ls -la
    
    - name: Check for gradlew
      run: |
        if [ -f "gradlew" ]; then
          echo "gradlew found"
        else
          echo "Looking for gradlew in subdirectories..."
          find . -name "gradlew" -type f
        fi
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: |
        chmod +x gradlew 2>/dev/null || true
        # If gradlew is in subdirectory
        find . -name "gradlew" -exec chmod +x {} \;
    
    - name: Build APK
      run: |
        # Try to run gradlew from root
        if [ -f "gradlew" ]; then
          ./gradlew assembleRelease --stacktrace
        else
          # If gradlew is in subdirectory
          GRADLE_PATH=$(find . -name "gradlew" -type f -not -path "*/\.*" | head -1)
          if [ -n "$GRADLE_PATH" ]; then
            DIR=$(dirname "$GRADLE_PATH")
            cd "$DIR"
            ./gradlew assembleRelease --stacktrace
            cd -
          else
            echo "gradlew not found!"
            exit 1
          fi
        fi
    
    - name: Find and upload APK
      uses: actions/upload-artifact@v3
      with:
        name: PoolPredictor-APK
        path: |
          **/build/outputs/apk/release/*.apk
          **/app/build/outputs/apk/release/*.apk
