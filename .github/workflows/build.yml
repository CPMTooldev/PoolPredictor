name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Extract ZIP file and fix structure
      run: |
        # Extract all zip files
        for zipfile in *.zip; do
          if [ -f "$zipfile" ]; then
            echo "Extracting $zipfile"
            unzip -o "$zipfile"
            rm "$zipfile"
          fi
        done
        
        # Move files from PoolPredictor-master to root if it exists
        if [ -d "PoolPredictor-master" ]; then
          echo "Moving files from PoolPredictor-master to root"
          shopt -s dotglob
          mv PoolPredictor-master/* .
          rm -rf PoolPredictor-master
        fi
        
        echo "Directory structure after fix:"
        ls -la
    
    - name: Make gradlew executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          echo "gradlew found in root"
        else
          echo "ERROR: gradlew not found!"
          exit 1
        fi
    
    - name: Build APK
      run: |
        ./gradlew assembleRelease --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PoolPredictor-APK
        path: |
          app/build/outputs/apk/release/*.apk
